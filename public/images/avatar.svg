<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" fill="none">
  <!-- Background -->
  <rect width="200" height="300" fill="#1a2a1a"/>

  <!-- Body / shirt -->
  <ellipse cx="100" cy="260" rx="70" ry="55" fill="#2d6a4f"/>
  <ellipse cx="100" cy="230" rx="50" ry="40" fill="#2d6a4f"/>

  <!-- Neck -->
  <rect x="85" y="155" width="30" height="35" rx="10" fill="#c9a87c"/>

  <!-- Head -->
  <ellipse cx="100" cy="130" rx="48" ry="55" fill="#c9a87c"/>

  <!-- Hair -->
  <ellipse cx="100" cy="85" rx="48" ry="28" fill="#3b2507"/>
  <rect x="52" y="85" width="15" height="40" rx="8" fill="#3b2507"/>
  <rect x="133" y="85" width="15" height="40" rx="8" fill="#3b2507"/>

  <!-- Eyes -->
  <ellipse cx="82" cy="130" rx="7" ry="8" fill="white"/>
  <ellipse cx="118" cy="130" rx="7" ry="8" fill="white"/>
  <circle cx="84" cy="131" r="4" fill="#1a1a1a"/>
  <circle cx="120" cy="131" r="4" fill="#1a1a1a"/>
  <circle cx="85" cy="129" r="1.5" fill="white"/>
  <circle cx="121" cy="129" r="1.5" fill="white"/>

  <!-- Eyebrows -->
  <path d="M74 118 Q82 113 90 118" stroke="#3b2507" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M110 118 Q118 113 126 118" stroke="#3b2507" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Nose -->
  <path d="M97 138 Q100 148 103 138" stroke="#a07850" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Smile -->
  <path d="M86 158 Q100 168 114 158" stroke="#a07850" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Collar -->
  <path d="M75 195 L100 215 L125 195" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
